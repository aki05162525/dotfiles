# -----------------------------
# WSL-optimized Starship config
# -----------------------------

format = """
$directory\
[ ](fg:#88C0D0 bg:#1d2230)\
$git_branch\
$git_status\
[ ](fg:#1d2230)\
\n$character
"""

# 右側：WSLでズレやすい絵文字は使わず、記号はNerd Font側に寄せる
right_format = """
$cmd_duration\
$username\
$time
"""

# コマンドラインに1行分のスペースを入れる
add_newline = true

# WSLではユーザー名が常に出ると冗長になりやすいので「必要時だけ」推奨。
# 常に出したいなら disabled=false のままでOK。
[username]
style_user = "white bold"
style_root = "black bold"
format = "user: [$user]($style) "
# WSLでは基本非表示推奨（sudo/root時は root 色で出る）
disabled = true

# left_promptとright_promptの間を何で埋めるか設定
[fill]
symbol = " "

[directory]
style = "fg:#2E3440 bg:#88C0D0 bold"
truncation_length = 6
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾 "
# read_only_style の bg を directory の bg と揃えて破綻を防ぐ（WSLで目立ちすぎ防止）
read_only_style = "fg:#f7768e bg:#88C0D0"
format = "[ $path ]($style)[$read_only]($read_only_style)"

# WSL特有の /mnt/c/... を短くする（ここが一番効く）
[directory.substitutions]
"/mnt/c" = "C:"
"/mnt/d" = "D:"
"/mnt/e" = "E:"
"~/Documents" = "󰈙 "
"~/Downloads" = " "
"~/Music" = " "
"~/Pictures" = " "
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[aws]
disabled = true

[gcloud]
disabled = true

[git_branch]
symbol = ""
style = "bg:#1d2230"
format = "[[ $symbol $branch ](fg:#769ff0 bg:#1d2230)]($style)"

[git_status]
style = "bg:#1d2230"
format = "[[($all_status$ahead_behind )](fg:#769ff0 bg:#1d2230)]($style)"

[cmd_duration]
min_time = 1
style = "fg:#e0af68"
format = "[$duration]($style)"

[time]
disabled = false
time_format = "%R"
format = "[   $time ](fg:#a0a9cb)"

[character]
vimcmd_symbol = "[V](bold green) "
